<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: detect v1 or v2 base, store full path, redirect to index.html
    var path = window.location.pathname;
    var v2Base = '/New-Recommendations-2.0/v2';
    var v1Base = '/New-Recommendations-2.0';
    var isV2 = path.startsWith(v2Base + '/') || path === v2Base;
    var appBase = isV2 ? v2Base : v1Base;
    sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
    window.location.replace(appBase + '/');
  </script>
</head>
<body></body>
</html>
